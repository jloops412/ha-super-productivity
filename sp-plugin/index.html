<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Bridge</title>
  <style>
    :root { --bg:#1e1e2e; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08); --text:#e0e0e0; --dim:rgba(255,255,255,0.45); --accent:#42a5f5; --success:#66bb6a; --warn:#ffa726; --err:#ef5350; --r:10px; }
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);background:transparent;font-size:13px;line-height:1.5}
    .tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
    .tab{flex:1;padding:10px 4px;text-align:center;font-size:0.75em;font-weight:500;opacity:0.5;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
    .tab:hover{opacity:0.8} .tab.active{opacity:1;border-bottom-color:var(--accent);color:var(--accent)}
    .page{display:none;padding:14px} .page.active{display:block}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
    .card-title{font-size:0.7em;text-transform:uppercase;letter-spacing:1.5px;opacity:0.4;margin-bottom:8px}
    .row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
    .row+.row{border-top:1px solid rgba(255,255,255,0.03)}
    .btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.82em;cursor:pointer;transition:all 0.15s;margin-bottom:5px}
    .btn:hover{background:rgba(255,255,255,0.08)} .btn.accent{border-color:rgba(66,165,245,0.4);color:var(--accent)} .btn.success{border-color:rgba(102,187,106,0.4);color:var(--success)} .btn.warn{border-color:rgba(255,167,38,0.4);color:var(--warn)} .btn.err{border-color:rgba(239,83,80,0.4);color:var(--err)} .btn.sm{width:auto;padding:5px 10px;font-size:0.75em}
    .field{margin-bottom:10px} .field label{display:block;font-size:0.78em;opacity:0.6;margin-bottom:3px}
    .field input,.field select{width:100%;padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:rgba(0,0,0,0.3);color:var(--text);font-size:0.88em}
    .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
    .field .hint{font-size:0.72em;opacity:0.35;margin-top:2px}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:8px;font-size:0.72em;font-weight:500}
    .badge.ok{background:rgba(76,175,80,0.15);color:var(--success)} .badge.err{background:rgba(244,67,54,0.15);color:var(--err)}
    .dot{width:6px;height:6px;border-radius:50%} .dot.ok{background:var(--success);animation:pulse 2s infinite} .dot.err{background:var(--err)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
    .header h1{font-size:1em;font-weight:600}
    .rule-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:8px;position:relative}
    .rule-card .rule-name{font-weight:600;font-size:0.9em} .rule-card .rule-desc{font-size:0.78em;opacity:0.5;margin-top:2px}
    .rule-card .rule-actions{display:flex;gap:4px;margin-top:6px}
    .toggle{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,0.1);position:relative;cursor:pointer;border:1px solid var(--border)}
    .toggle.on{background:rgba(102,187,106,0.3);border-color:rgba(102,187,106,0.5)}
    .toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text);transition:0.2s}
    .toggle.on::after{left:18px}
    .sensor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .sensor-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
    .sensor-card .value{font-size:1.3em;font-weight:700;margin:3px 0} .sensor-card .label{font-size:0.7em;opacity:0.5}
  </style>
</head>
<body>
  <div class="header">
    <h1>HA Bridge</h1>
    <span class="badge" id="conn-badge"><span class="dot" id="conn-dot"></span><span id="conn-text">...</span></span>
  </div>
  <div class="tabs">
    <div class="tab active" data-page="rules">Rules</div>
    <div class="tab" data-page="sensors">Sensors</div>
    <div class="tab" data-page="services">Services</div>
    <div class="tab" data-page="settings">Settings</div>
  </div>

  <!-- RULES PAGE -->
  <div class="page active" id="page-rules">
    <div id="rules-list"></div>
    <button class="btn accent" onclick="addRule()">+ Add Rule</button>
  </div>

  <!-- RULE EDITOR (hidden by default) -->
  <div class="page" id="page-editor">
    <div class="card">
      <div class="card-title">Edit Rule</div>
      <div class="field"><label>Rule Name</label><input id="re-name" placeholder="Focus mode on start"></div>
      <div class="field"><label>Trigger</label>
        <select id="re-trigger">
          <option value="task_start">Task Started (tracking begins)</option>
          <option value="task_stop">Task Stopped (tracking ends)</option>
          <option value="task_complete">Task Completed</option>
          <option value="all_done">All Today's Tasks Done</option>
          <option value="timer">Timer (after X minutes of tracking)</option>
          <option value="day_end">Day Finished</option>
        </select>
      </div>
      <div class="field" id="re-timer-field" style="display:none"><label>After (minutes)</label><input id="re-minutes" type="number" placeholder="25"></div>
      <div class="card-title" style="margin-top:12px">Conditions (optional)</div>
      <div class="field"><label>Only for Project</label><select id="re-project"><option value="">Any project</option></select></div>
      <div class="field"><label>Only for Tag</label><select id="re-tag"><option value="">Any tag</option></select></div>
      <div class="field"><label>Title Contains</label><input id="re-title" placeholder=""></div>
      <div class="card-title" style="margin-top:12px">Action</div>
      <div class="field"><label>Action Type</label>
        <select id="re-action-type" onchange="toggleActionFields()">
          <option value="scene">Activate Scene</option>
          <option value="service">Call Service</option>
          <option value="notify">Send Notification</option>
        </select>
      </div>
      <div class="field" id="re-scene-field"><label>Scene</label><select id="re-scene"></select></div>
      <div class="field" id="re-service-field" style="display:none"><label>Service</label><input id="re-service" placeholder="light.turn_on"></div>
      <div class="field" id="re-entity-field" style="display:none"><label>Target Entity</label><select id="re-entity"></select></div>
      <div class="field" id="re-notify-field" style="display:none"><label>Message</label><input id="re-message" placeholder="Time for a break!"></div>
    </div>
    <button class="btn success" onclick="saveRule()">Save Rule</button>
    <button class="btn" onclick="cancelEdit()">Cancel</button>
  </div>

  <!-- SENSORS PAGE -->
  <div class="page" id="page-sensors">
    <div id="sensor-grid" class="sensor-grid"></div>
    <p id="no-sensors" style="text-align:center;opacity:0.4;padding:20px;font-size:0.85em">Configure sensors in Settings</p>
  </div>

  <!-- SERVICES PAGE -->
  <div class="page" id="page-services">
    <div class="card">
      <div class="card-title">Call HA Service</div>
      <div class="field"><label>Service</label><input id="svc-service" placeholder="light.turn_on"></div>
      <div class="field"><label>Entity</label><select id="svc-entity-select"><option value="">-- Select entity --</option></select></div>
      <div class="field"><label>Data (JSON, optional)</label><input id="svc-data" placeholder='{"brightness": 200}'></div>
      <button class="btn success" onclick="callService()">Execute</button>
    </div>
    <div class="card"><div class="card-title">History</div><div id="svc-history" style="font-size:0.8em;opacity:0.5">No calls yet</div></div>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title">Connection</div>
      <div class="field"><label>Home Assistant URL</label><input id="cfg-url" placeholder="http://homeassistant.local:8123"><div class="hint">Local URL, not Nabu Casa cloud</div></div>
      <div class="field"><label>Access Token</label><input id="cfg-token" type="password" placeholder="eyJ..."><div class="hint">Profile > Long-Lived Access Tokens</div></div>
      <div class="field"><label>Webhook ID</label><input id="cfg-webhook" placeholder="super_productivity_01KX..."><div class="hint">For instant sync to HA</div></div>
    </div>
    <div class="card">
      <div class="card-title">Sensors (comma-separated entity IDs)</div>
      <div class="field"><input id="cfg-sensors" placeholder="sensor.temperature, binary_sensor.motion"></div>
    </div>
    <button class="btn success" onclick="saveSettings()">Save Settings</button>
    <button class="btn accent" onclick="testConn()">Test Connection</button>
  </div>

  <script>
    let config = { haUrl:'', haToken:'', webhookId:'', rules:[], showSensors:'' };
    let editingRuleIdx = -1;
    let projects = [];
    let tags = [];
    let svcHist = [];
    let haEntities = { scenes:[], lights:[], switches:[], scripts:[], sensors:[], all:[] };

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('page-' + tab.dataset.page).classList.add('active');
      });
    });

    // --- Config ---
    async function loadConfig() {
      try { const raw = await PluginAPI.loadSyncedData(); if (raw) config = JSON.parse(raw); } catch(e) {}
      if (!config.rules) config.rules = [];
      populateSettings();
    }
    async function saveConfig() { await PluginAPI.persistDataSynced(JSON.stringify(config)); }
    function populateSettings() {
      document.getElementById('cfg-url').value = config.haUrl || '';
      document.getElementById('cfg-token').value = config.haToken || '';
      document.getElementById('cfg-webhook').value = config.webhookId || '';
      document.getElementById('cfg-sensors').value = config.showSensors || '';
    }
    async function saveSettings() {
      config.haUrl = document.getElementById('cfg-url').value.trim().replace(/\/$/,'');
      config.haToken = document.getElementById('cfg-token').value.trim();
      config.webhookId = document.getElementById('cfg-webhook').value.trim();
      config.showSensors = document.getElementById('cfg-sensors').value.trim();
      await saveConfig();
      PluginAPI.showSnack({msg:'Settings saved!',type:'SUCCESS'});
      checkConn(); loadSensors(); fetchHAEntities();
    }

    // --- HA API ---
    async function haApi(method, path, body=null) {
      if(!config.haUrl||!config.haToken) return null;
      const opts={method,headers:{'Authorization':`Bearer ${config.haToken}`,'Content-Type':'application/json'}};
      if(body) opts.body=JSON.stringify(body);
      try{const r=await fetch(`${config.haUrl}/api/${path}`,opts); return r.ok?await r.json():null;}catch(e){return null;}
    }

    async function fetchHAEntities() {
      if (!config.haUrl || !config.haToken) return;
      const states = await haApi('GET', 'states');
      if (!states) return;
      haEntities.all = states;
      haEntities.scenes = states.filter(s => s.entity_id.startsWith('scene.'));
      haEntities.lights = states.filter(s => s.entity_id.startsWith('light.'));
      haEntities.switches = states.filter(s => s.entity_id.startsWith('switch.'));
      haEntities.scripts = states.filter(s => s.entity_id.startsWith('script.'));
      haEntities.sensors = states.filter(s => s.entity_id.startsWith('sensor.') || s.entity_id.startsWith('binary_sensor.'));
      // Populate the services page entity dropdown
      buildEntitySelect('svc-entity-select', ['lights','switches','scripts','scenes'], '');
      console.log('[HA Bridge] Loaded', states.length, 'entities from HA');
    }

    function entityName(e) { return e.attributes.friendly_name || e.entity_id.split('.').pop().replace(/_/g,' '); }

    function buildEntitySelect(id, domains, currentValue) {
      const el = document.getElementById(id);
      if (!el) return;
      const entities = domains.flatMap(d => haEntities[d] || []);
      if (entities.length === 0) {
        // Fallback to text input behavior - keep existing value
        el.innerHTML = '<option value="">-- Connect to HA first --</option>';
        if (currentValue) el.innerHTML += '<option value="' + currentValue + '" selected>' + currentValue + '</option>';
        return;
      }
      let html = '<option value="">-- Select --</option>';
      const grouped = {};
      entities.forEach(e => {
        const domain = e.entity_id.split('.')[0];
        if (!grouped[domain]) grouped[domain] = [];
        grouped[domain].push(e);
      });
      for (const [domain, ents] of Object.entries(grouped).sort()) {
        html += '<optgroup label="' + domain + '">';
        ents.sort((a,b) => entityName(a).localeCompare(entityName(b)));
        for (const e of ents) {
          const sel = e.entity_id === currentValue ? ' selected' : '';
          html += '<option value="' + e.entity_id + '"' + sel + '>' + entityName(e) + ' (' + e.entity_id + ')</option>';
        }
        html += '</optgroup>';
      }
      el.innerHTML = html;
    }

    async function checkConn() {
      const b=document.getElementById('conn-badge'),d=document.getElementById('conn-dot'),t=document.getElementById('conn-text');
      if(!config.haUrl||!config.haToken){b.className='badge err';d.className='dot err';t.textContent='Not set';return false;}
      const r=await haApi('GET','config');
      if(r){b.className='badge ok';d.className='dot ok';t.textContent='Connected';return true;}
      b.className='badge err';d.className='dot err';t.textContent='Offline';return false;
    }
    async function testConn(){
      const ok=await checkConn();
      if(ok){const r=await haApi('GET','config');PluginAPI.showSnack({msg:`Connected: HA ${r.version}`,type:'SUCCESS'});}
      else PluginAPI.showSnack({msg:'Cannot reach HA',type:'ERROR'});
    }

    // --- Rules ---
    function renderRules() {
      const list = document.getElementById('rules-list');
      if (config.rules.length === 0) { list.innerHTML = '<p style="text-align:center;opacity:0.4;padding:20px">No rules yet. Add one to automate your smart home based on your tasks.</p>'; return; }
      list.innerHTML = config.rules.map((r, i) => {
        const triggerLabels = {task_start:'Task Start',task_stop:'Task Stop',task_complete:'Task Complete',all_done:'All Done',timer:`Timer (${r.conditions?.minutes||0}m)`,day_end:'Day End'};
        const actionLabels = {scene:'Scene: '+((r.action||{}).entity||''),service:'Service: '+((r.action||{}).service||''),notify:'Notify: '+((r.action||{}).message||'').slice(0,30)};
        return `<div class="rule-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div class="rule-name">${r.name||'Unnamed'}</div><div class="rule-desc">${triggerLabels[r.trigger]||r.trigger} → ${actionLabels[r.action?.type]||'?'}</div></div>
            <div class="toggle ${r.enabled?'on':''}" onclick="toggleRule(${i})"></div>
          </div>
          <div class="rule-actions"><button class="btn sm accent" onclick="editRule(${i})">Edit</button><button class="btn sm err" onclick="deleteRule(${i})">Delete</button></div>
        </div>`;
      }).join('');
    }

    async function toggleRule(i) { config.rules[i].enabled = !config.rules[i].enabled; await saveConfig(); renderRules(); }
    async function deleteRule(i) { config.rules.splice(i, 1); await saveConfig(); renderRules(); }

    async function loadProjectsAndTags() {
      try { projects = await PluginAPI.getAllProjects(); } catch(e) { projects = []; }
      try { tags = await PluginAPI.getAllTags(); } catch(e) { tags = []; }
    }

    function populateDropdowns() {
      const ps = document.getElementById('re-project');
      ps.innerHTML = '<option value="">Any project</option>' + projects.map(p => `<option value="${p.id}">${p.title}</option>`).join('');
      const ts = document.getElementById('re-tag');
      ts.innerHTML = '<option value="">Any tag</option>' + tags.map(t => `<option value="${t.id}">${t.title}</option>`).join('');
    }

    function addRule() {
      editingRuleIdx = -1;
      document.getElementById('re-name').value = '';
      document.getElementById('re-trigger').value = 'task_start';
      document.getElementById('re-minutes').value = '';
      document.getElementById('re-project').value = '';
      document.getElementById('re-tag').value = '';
      document.getElementById('re-title').value = '';
      document.getElementById('re-action-type').value = 'scene';
      document.getElementById('re-service').value = '';
      document.getElementById('re-message').value = '';
      toggleActionFields(); toggleTimerField();
      populateDropdowns();
      buildEntitySelect('re-scene', ['scenes'], '');
      buildEntitySelect('re-entity', ['lights','switches','scripts','scenes'], '');
      showPage('editor');
    }

    function editRule(i) {
      editingRuleIdx = i;
      const r = config.rules[i];
      document.getElementById('re-name').value = r.name || '';
      document.getElementById('re-trigger').value = r.trigger || 'task_start';
      document.getElementById('re-minutes').value = r.conditions?.minutes || '';
      document.getElementById('re-project').value = r.conditions?.projectId || '';
      document.getElementById('re-tag').value = r.conditions?.tagId || '';
      document.getElementById('re-title').value = r.conditions?.titleContains || '';
      document.getElementById('re-action-type').value = r.action?.type || 'scene';
      document.getElementById('re-service').value = r.action?.service || '';
      document.getElementById('re-message').value = r.action?.message || '';
      toggleActionFields(); toggleTimerField();
      populateDropdowns();
      buildEntitySelect('re-scene', ['scenes'], r.action?.entity || '');
      buildEntitySelect('re-entity', ['lights','switches','scripts','scenes'], r.action?.entity || '');
      showPage('editor');
    }

    async function saveRule() {
      const rule = {
        id: editingRuleIdx >= 0 ? config.rules[editingRuleIdx].id : 'rule_' + Date.now(),
        name: document.getElementById('re-name').value || 'Unnamed Rule',
        enabled: editingRuleIdx >= 0 ? config.rules[editingRuleIdx].enabled : true,
        trigger: document.getElementById('re-trigger').value,
        conditions: {},
        action: {},
      };
      const proj = document.getElementById('re-project').value;
      const tag = document.getElementById('re-tag').value;
      const title = document.getElementById('re-title').value.trim();
      const mins = document.getElementById('re-minutes').value;
      if (proj) rule.conditions.projectId = proj;
      if (tag) rule.conditions.tagId = tag;
      if (title) rule.conditions.titleContains = title;
      if (mins) rule.conditions.minutes = parseInt(mins);

      const actionType = document.getElementById('re-action-type').value;
      rule.action.type = actionType;
      if (actionType === 'scene') rule.action.entity = document.getElementById('re-scene').value.trim();
      else if (actionType === 'service') { rule.action.service = document.getElementById('re-service').value.trim(); rule.action.entity = document.getElementById('re-entity').value.trim(); }
      else if (actionType === 'notify') rule.action.message = document.getElementById('re-message').value.trim();

      if (editingRuleIdx >= 0) config.rules[editingRuleIdx] = rule;
      else config.rules.push(rule);

      await saveConfig();
      renderRules();
      showPage('rules');
      PluginAPI.showSnack({msg:'Rule saved!',type:'SUCCESS'});
    }

    function cancelEdit() { showPage('rules'); }

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      if (name === 'rules') { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelector('[data-page=rules]').classList.add('active'); }
    }

    function toggleActionFields() {
      const t = document.getElementById('re-action-type').value;
      document.getElementById('re-scene-field').style.display = t==='scene'?'':'none';
      document.getElementById('re-service-field').style.display = t==='service'?'':'none';
      document.getElementById('re-entity-field').style.display = t==='service'?'':'none';
      document.getElementById('re-notify-field').style.display = t==='notify'?'':'none';
    }
    function toggleTimerField() {
      const t = document.getElementById('re-trigger').value;
      document.getElementById('re-timer-field').style.display = t==='timer'?'':'none';
    }
    document.getElementById('re-trigger').addEventListener('change', toggleTimerField);

    // --- Sensors ---
    async function loadSensors() {
      const grid=document.getElementById('sensor-grid'), ns=document.getElementById('no-sensors');
      if(!config.showSensors){grid.innerHTML='';ns.style.display='block';return;}
      const ids=config.showSensors.split(',').map(s=>s.trim()).filter(Boolean);
      if(!ids.length){grid.innerHTML='';ns.style.display='block';return;}
      ns.style.display='none'; grid.innerHTML='';
      for(const id of ids){
        const st=await haApi('GET',`states/${id}`);
        const c=document.createElement('div');c.className='sensor-card';
        if(st){const nm=st.attributes.friendly_name||id.split('.').pop();const v=st.state+(st.attributes.unit_of_measurement?' '+st.attributes.unit_of_measurement:'');c.innerHTML=`<div class="label">${nm}</div><div class="value">${v}</div>`;}
        else c.innerHTML=`<div class="label">${id}</div><div class="value">--</div>`;
        grid.appendChild(c);
      }
    }

    // --- Services ---
    async function callService(){
      const svc=document.getElementById('svc-service').value.trim(),ent=document.getElementById('svc-entity-select').value,extra=document.getElementById('svc-data').value.trim();
      if(!svc)return;const[domain,s]=svc.split('.');if(!domain||!s){PluginAPI.showSnack({msg:'Format: domain.service',type:'WARN'});return;}
      let data={};if(ent)data.entity_id=ent;if(extra)try{Object.assign(data,JSON.parse(extra));}catch(e){PluginAPI.showSnack({msg:'Invalid JSON',type:'ERROR'});return;}
      const r=await haApi('POST',`services/${domain}/${s}`,data);
      svcHist.unshift(`${new Date().toLocaleTimeString()} ${svc}${ent?' ('+ent+')':''}: ${r!==null?'OK':'FAIL'}`);
      if(svcHist.length>8)svcHist.pop();
      document.getElementById('svc-history').innerHTML=svcHist.join('<br>');
      PluginAPI.showSnack({msg:r!==null?`${svc} OK`:'Failed',type:r!==null?'SUCCESS':'ERROR'});
    }

    // --- Init ---
    async function init(){await loadConfig();await checkConn();await fetchHAEntities();await loadProjectsAndTags();renderRules();loadSensors();}
    init();
    setInterval(loadSensors,30000);
  </script>
</body>
</html>
